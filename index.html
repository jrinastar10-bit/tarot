<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🔮 오늘의 타로</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0812;
    --surface: #141020;
    --card-bg: #1b1530;
    --gold: #d4b46a;
    --gold-soft: rgba(212,180,106,.55);
    --gold-faint: rgba(212,180,106,.14);
    --gold-line: rgba(212,180,106,.28);
    --text: #e8e2d4;
    --muted: #857c93;
    --lavender: #b8a4d4;
    --deep: #0d0a16;
  }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .page { position: relative; z-index: 1; max-width: 440px; margin: 0 auto; }

  /* ── Lock screen ── */
  .lock-screen {
    position: fixed; inset: 0; z-index: 50;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 32px;
  }
  .lock-screen.active { display: flex; }
  .lock-icon { font-size: 52px; margin-bottom: 24px; animation: lockPulse 2.5s ease-in-out infinite; }
  @keyframes lockPulse { 0%,100% { opacity:.6; transform:scale(1); } 50% { opacity:1; transform:scale(1.06); } }
  .lock-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 600; color: var(--gold); margin-bottom: 12px; letter-spacing: .03em; }
  .lock-desc { font-size: 13px; line-height: 1.9; color: var(--muted); }
  .lock-desc em { font-style: normal; color: var(--gold-soft); }
  .lock-ornament { margin-top: 28px; font-size: 14px; color: var(--gold-faint); letter-spacing: .5em; }

  /* ── Hero ── */
  .hero { text-align: center; padding: 54px 24px 26px; }
  .hero-ornament { font-size: 20px; color: var(--gold-soft); letter-spacing: .5em; margin-bottom: 16px; }
  .hero-eyebrow { font-size: 10px; letter-spacing: .3em; color: var(--gold-soft); text-transform: uppercase; margin-bottom: 14px; }
  .hero-title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: .02em;
  }
  .hero-title em { font-style: normal; color: var(--gold); }
  .hero-date { font-size: 12px; color: var(--muted); letter-spacing: .08em; }
  .gold-divider {
    width: 120px; height: 14px; margin: 22px auto;
    background:
      radial-gradient(circle at center, var(--gold-soft) 1.5px, transparent 2px) center/14px 14px no-repeat,
      linear-gradient(90deg, transparent, var(--gold-line) 30%, transparent 48%, transparent 52%, var(--gold-line) 70%, transparent) center/100% 1px no-repeat;
  }

  /* ── Question select ── */
  .q-section { padding: 0 20px 8px; }
  .section-label { text-align: center; font-size: 10px; letter-spacing: .25em; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
  .q-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }
  .qcard {
    background: var(--surface);
    border: 1px solid var(--gold-faint);
    border-radius: 14px;
    padding: 15px 12px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .qcard:active { transform: scale(.96); }
  .qcard.selected {
    border-color: var(--gold-line);
    background: var(--card-bg);
    box-shadow: 0 0 20px rgba(212,180,106,.12), inset 0 0 20px rgba(212,180,106,.04);
  }
  .qcard-emoji { font-size: 22px; display: block; margin-bottom: 7px; }
  .qcard-label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: .02em; }
  .qcard.selected .qcard-label { color: var(--gold); }

  /* ── Deck stage ── */
  .deck-stage { padding: 26px 20px 10px; display: none; }
  .deck-stage.visible { display: block; animation: fadeIn .5s ease both; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .deck-instruction {
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: .02em;
  }
  .deck-sub { text-align: center; font-size: 11px; color: var(--muted); margin-bottom: 22px; }
  .deck-sub em { font-style: normal; color: var(--gold-soft); }

  .fan {
    display: flex;
    justify-content: center;
    padding: 10px 0 26px;
    min-height: 150px;
  }
  .fan-card {
    width: 62px; height: 100px;
    margin: 0 -18px;
    border-radius: 8px;
    background:
      radial-gradient(circle at center, rgba(212,180,106,.16) 0%, transparent 60%),
      linear-gradient(160deg, #221a3a 0%, #17112a 100%);
    border: 1px solid var(--gold-line);
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    cursor: pointer;
    transition: transform .25s, box-shadow .25s, opacity .3s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  .fan-card::before {
    content: '✦';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--gold-soft);
  }
  .fan-card::after {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid var(--gold-faint);
    border-radius: 5px;
  }
  .fan-card:active { transform: translateY(-14px); }
  .fan-card.picked { opacity: 0; pointer-events: none; transform: translateY(-30px) scale(.8); }

  /* ── Reading ── */
  .reading { padding: 8px 20px 56px; display: none; }
  .reading.visible { display: block; }
  .spread-title {
    text-align: center;
    font-size: 10px;
    letter-spacing: .25em;
    color: var(--gold-soft);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .tcard-wrap { margin-bottom: 16px; perspective: 1000px; animation: rise .5s ease both; }
  @keyframes rise { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }
  .tcard {
    position: relative;
    width: 100%;
    transform-style: preserve-3d;
    transition: transform .8s cubic-bezier(.4,.1,.2,1);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tcard.flipped { transform: rotateY(180deg); cursor: default; }
  .tface {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    overflow: hidden;
  }
  .tback {
    min-height: 130px;
    background:
      radial-gradient(circle at center, rgba(212,180,106,.14) 0%, transparent 65%),
      linear-gradient(160deg, #211a38 0%, #16102a 100%);
    border: 1px solid var(--gold-line);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .tback-star { font-size: 26px; color: var(--gold-soft); }
  .tback-hint { font-size: 11px; color: var(--muted); letter-spacing: .08em; }
  .tfront {
    position: absolute;
    inset: 0;
    transform: rotateY(180deg);
    background: var(--card-bg);
    border: 1px solid var(--gold-line);
    padding: 20px 18px;
    min-height: 130px;
    height: auto;
  }
  .tcard.flipped .tfront { position: relative; inset: auto; }
  .tcard.flipped .tback { position: absolute; inset: 0; }
  .pos-label {
    display: inline-block;
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--gold);
    border: 1px solid var(--gold-line);
    border-radius: 20px;
    padding: 3px 10px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .tname-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
  .tname { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--gold); }
  .tname-en { font-size: 10px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
  .treversed { font-size: 10px; color: var(--lavender); }
  .temoji { font-size: 34px; margin: 8px 0 10px; }
  .tkeywords { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .kw { background: var(--gold-faint); border: 1px solid var(--gold-faint); border-radius: 20px; padding: 3px 10px; font-size: 10px; color: var(--gold-soft); }
  .tmeaning { font-size: 13px; line-height: 1.85; color: var(--text); opacity: .9; }

  /* ── Summary ── */
  .summary {
    margin-top: 20px;
    background: linear-gradient(160deg, rgba(212,180,106,.08), rgba(212,180,106,.02));
    border: 1px solid var(--gold-line);
    border-radius: 16px;
    padding: 20px 18px;
    display: none;
    animation: rise .5s ease both;
  }
  .summary.visible { display: block; }
  .summary-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 10px;
    letter-spacing: .04em;
  }
  .summary-text { font-size: 13px; line-height: 1.9; color: var(--text); opacity: .9; }
  .again-btn {
    display: block;
    width: 100%;
    margin-top: 22px;
    background: transparent;
    border: 1px solid var(--gold-line);
    border-radius: 12px;
    padding: 13px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--gold);
    cursor: pointer;
    letter-spacing: .05em;
    transition: all .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .again-btn:active { background: var(--gold-faint); }

  .footer-msg { text-align: center; font-size: 11px; color: var(--muted); margin-top: 24px; line-height: 1.9; }
  .footer-msg em { font-style: normal; color: var(--gold-soft); }
</style>
</head>
<body>
<div class="lock-screen" id="lock-screen">
  <div class="lock-icon">🔮</div>
  <div class="lock-title">봉인된 타로점</div>
  <p class="lock-desc">
    이 타로점은 <em>전용 NFC 키링</em>으로만 열 수 있어요.<br>
    키링을 핸드폰 뒷면에 살짝 대어주세요 ✦
  </p>
  <div class="lock-ornament">✦ ✧ ✦</div>
</div>
<script>
// ── Access gate ──────────────────────────────────
(function(){
  function h(s){let x=2166136261;for(let i=0;i<s.length;i++){x^=s.charCodeAt(i);x=Math.imul(x,16777619);}return x>>>0;}
  const KEY_HASH = 3870753458; // double-hashed secret
  const params = new URLSearchParams(location.search);
  const key = params.get('key') || '';
  const ok = h(String(h(key))) === KEY_HASH;
  if(!ok) {
    document.addEventListener('DOMContentLoaded', function(){
      document.getElementById('lock-screen').classList.add('active');
      document.querySelector('.page').style.display = 'none';
    });
  }
})();
// ── Copy deterrents (casual protection only) ─────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && ['s','u','p'].includes(e.key.toLowerCase())) e.preventDefault();
  if(e.key === 'F12') e.preventDefault();
});
</script>
<canvas id="stars"></canvas>
<div class="page">

  <div class="hero">
    <div class="hero-ornament">✦ ✧ ✦</div>
    <p class="hero-eyebrow">Tarot Reading</p>
    <h1 class="hero-title">별이 전하는<br><em>오늘의 타로</em></h1>
    <p class="hero-date" id="today-date"></p>
  </div>
  <div class="gold-divider"></div>

  <div class="q-section" id="q-section">
    <p class="section-label">마음속 질문을 골라주세요</p>
    <div class="q-grid" id="q-grid"></div>
  </div>

  <div class="deck-stage" id="deck-stage">
    <p class="deck-instruction">마음을 가라앉히고, 이끌리는 카드 <em style="font-style:normal;color:var(--gold)">세 장</em>을 골라주세요</p>
    <p class="deck-sub">남은 카드 <em id="pick-count">3</em>장</p>
    <div class="fan" id="fan"></div>
  </div>

  <div class="reading" id="reading">
    <p class="spread-title">✦ Past · Present · Future ✦</p>
    <div id="cards-area"></div>
    <div class="summary" id="summary">
      <p class="summary-title">🔮 카드가 전하는 메시지</p>
      <p class="summary-text" id="summary-text"></p>
      <button class="again-btn" onclick="location.reload()">✦ 다시 점 보기</button>
    </div>
    <p class="footer-msg">타로는 정해진 미래가 아닌, <em>지금의 흐름</em>을 비추는 거울입니다<br>오늘도 좋은 기운 가득한 하루 되세요 ✨</p>
  </div>

</div>

<script>
// ── Stars ────────────────────────────────────────
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H, SA = [];
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  SA = Array.from({length: 110}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.3+.3, a: Math.random(), da: (Math.random()-.5)*.007
  }));
}
resize(); window.addEventListener('resize', resize);
function draw() {
  ctx.clearRect(0,0,W,H);
  SA.forEach(s => {
    s.a = Math.max(.08, Math.min(.9, s.a+s.da));
    if(s.a<=.08||s.a>=.9) s.da*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(220,200,150,${s.a*.6})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

// ── Major Arcana (22) ────────────────────────────
const CARDS = [
  {n:0,  name:'바보',        en:'The Fool',           emoji:'🃏', kw:['새출발','자유','순수'],       up:'새로운 여정의 시작을 알리는 카드입니다. 두려움 없이 첫 발을 내딛으세요. 미숙해 보여도 그 순수함이 오히려 길을 열어줍니다.', rev:'무모한 선택이나 준비 부족을 경고합니다. 즉흥적인 결정보다 한 번 더 생각해보는 신중함이 필요한 때입니다.'},
  {n:1,  name:'마법사',      en:'The Magician',        emoji:'🪄', kw:['능력','창조','실행력'],       up:'당신에겐 이미 필요한 모든 도구가 갖춰져 있습니다. 재능과 의지를 모아 행동으로 옮기면 원하는 것을 창조해낼 수 있습니다.', rev:'재능을 낭비하거나 자신을 과소평가하고 있진 않나요? 능력은 충분한데 방향이 흐릿한 상태입니다.'},
  {n:2,  name:'여사제',      en:'The High Priestess',  emoji:'🌙', kw:['직관','비밀','내면'],         up:'답은 바깥이 아닌 당신 안에 있습니다. 직관의 목소리에 귀 기울이세요. 서두르지 말고 때를 기다리는 지혜가 필요합니다.', rev:'내면의 목소리를 무시하고 있습니다. 주변 소음에서 벗어나 혼자만의 조용한 시간을 가져보세요.'},
  {n:3,  name:'여황제',      en:'The Empress',         emoji:'🌸', kw:['풍요','사랑','결실'],         up:'풍요와 성장의 기운이 가득합니다. 노력해온 일들이 결실을 맺기 시작하고, 사랑과 돌봄이 넘치는 시기입니다.', rev:'자신을 돌보는 일을 소홀히 하고 있진 않나요? 남을 챙기느라 지친 마음을 먼저 회복해야 할 때입니다.'},
  {n:4,  name:'황제',        en:'The Emperor',         emoji:'👑', kw:['안정','리더십','책임'],       up:'질서와 안정을 세울 수 있는 힘이 당신에게 있습니다. 체계적으로 계획하고 책임감 있게 이끌면 확실한 성과가 따릅니다.', rev:'지나친 통제욕이나 고집이 발목을 잡을 수 있습니다. 유연함을 되찾으면 상황이 부드럽게 풀립니다.'},
  {n:5,  name:'교황',        en:'The Hierophant',      emoji:'📿', kw:['지혜','전통','조언'],         up:'믿을 수 있는 조언자나 검증된 방법이 도움이 되는 시기입니다. 혼자 고민하지 말고 경험자의 지혜를 구해보세요.', rev:'관습에 얽매이지 말고 자신만의 방식을 찾아야 할 때입니다. 낡은 틀을 벗어나는 용기가 필요합니다.'},
  {n:6,  name:'연인',        en:'The Lovers',          emoji:'💞', kw:['사랑','선택','조화'],         up:'마음이 통하는 깊은 인연, 혹은 중요한 선택의 순간이 다가옵니다. 머리가 아닌 진심이 향하는 곳을 선택하세요.', rev:'관계의 불균형이나 망설임이 보입니다. 진짜 원하는 것이 무엇인지 스스로에게 솔직해질 필요가 있습니다.'},
  {n:7,  name:'전차',        en:'The Chariot',         emoji:'🏇', kw:['전진','승리','의지'],         up:'강한 의지로 밀고 나가면 승리하는 카드입니다. 장애물이 있어도 목표를 향해 흔들림 없이 전진하세요.', rev:'방향을 잃고 힘만 쓰고 있진 않나요? 속도를 늦추고 목적지를 다시 확인한 뒤 출발해도 늦지 않습니다.'},
  {n:8,  name:'힘',          en:'Strength',            emoji:'🦁', kw:['용기','인내','부드러운 힘'],  up:'진짜 힘은 부드러움에서 나옵니다. 조급함을 다스리고 꾸준히 나아가면, 어떤 어려움도 당신을 꺾지 못합니다.', rev:'자신감이 흔들리고 있습니다. 하지만 기억하세요 — 지금까지 견뎌온 것만으로도 당신은 충분히 강합니다.'},
  {n:9,  name:'은둔자',      en:'The Hermit',          emoji:'🏮', kw:['성찰','고독','내면의 빛'],    up:'혼자만의 시간이 필요한 시기입니다. 바깥의 소란에서 물러나 내면을 들여다보면 중요한 깨달음을 얻게 됩니다.', rev:'고립이 길어지고 있습니다. 성찰의 시간은 충분했으니, 이제 세상 밖으로 한 걸음 나와보세요.'},
  {n:10, name:'운명의 수레바퀴', en:'Wheel of Fortune', emoji:'🎡', kw:['전환점','행운','변화'],      up:'운명의 흐름이 바뀌는 전환점입니다. 예상치 못한 기회와 행운이 다가오니, 변화의 물결에 몸을 맡겨보세요.', rev:'일이 뜻대로 풀리지 않아 답답할 수 있습니다. 하지만 수레바퀴는 계속 돕니다 — 이 시기도 반드시 지나갑니다.'},

  {n:16, name:'탑',          en:'The Tower',           emoji:'🌩️', kw:['급변','붕괴','각성'],        up:'예상치 못한 변화가 찾아올 수 있습니다. 흔들리는 것은 무너지기 위해서가 아니라, 더 단단히 다시 세우기 위함입니다.', rev:'큰 위기는 피했지만 여진이 남아 있습니다. 이번 일을 통해 배운 것을 토대로 기반을 다시 다지세요.'},

  {n:18, name:'달',          en:'The Moon',            emoji:'🌕', kw:['불안','직감','무의식'],      up:'모든 것이 명확하지 않은 안갯속 같은 시기입니다. 불안에 휘둘리지 말고, 직감을 나침반 삼아 천천히 나아가세요.', rev:'혼란의 안개가 걷히기 시작합니다. 감춰져 있던 진실이 드러나고 마음이 한결 명료해집니다.'},
  {n:19, name:'태양',        en:'The Sun',             emoji:'☀️', kw:['성공','기쁨','활력'],        up:'타로에서 가장 밝은 카드입니다! 성공, 기쁨, 활력이 가득한 시기가 찾아옵니다. 마음껏 웃고 마음껏 빛나세요.', rev:'좋은 기운은 여전하지만 구름이 살짝 끼어 있습니다. 작은 성취도 충분히 축하하며 긍정의 감각을 되찾으세요.'},
  {n:20, name:'심판',        en:'Judgement',           emoji:'🎺', kw:['부활','결단','새 국면'],     up:'과거를 정리하고 새로운 국면으로 나아가는 부름의 카드입니다. 미뤄왔던 결단을 내릴 최적의 시기입니다.', rev:'스스로를 너무 가혹하게 심판하고 있진 않나요? 과거의 실수를 용서할 때 비로소 앞으로 나아갈 수 있습니다.'},
  {n:21, name:'세계',        en:'The World',           emoji:'🌍', kw:['완성','성취','통합'],        up:'하나의 여정이 완성되는 카드입니다. 그동안의 노력이 온전한 결실을 맺고, 축하할 일이 생깁니다. 다음 무대가 기다립니다.', rev:'완성까지 한 걸음 남았습니다. 마지막 마무리를 소홀히 하지 않으면 곧 원하던 결말에 도달합니다.'},
];

const QUESTIONS = [
  {id:'today', emoji:'🌅', label:'오늘의 전체 운세'},
  {id:'love',  emoji:'💗', label:'사랑 · 인연'},
  {id:'work',  emoji:'💼', label:'일 · 커리어'},
  {id:'money', emoji:'💰', label:'금전 · 재물'},
  {id:'choice',emoji:'🔀', label:'고민 중인 선택'},
  {id:'mind',  emoji:'🌿', label:'나의 마음 상태'},
];

const POSITIONS = ['과거 · 지나온 흐름','현재 · 지금의 나','미래 · 다가올 기운'];

const SUMMARIES = {
  today:'세 장의 카드가 보여주는 오늘의 흐름을 마음에 담아보세요. 과거의 경험이 현재의 나를 만들었고, 지금의 선택이 다가올 미래를 그려갑니다.',
  love:'인연의 흐름은 서두른다고 빨라지지 않습니다. 카드가 비춘 마음의 방향을 믿고, 솔직한 진심으로 다가가면 좋은 기운이 함께합니다.',
  work:'일의 성패는 하루아침에 결정되지 않습니다. 카드가 보여준 흐름 속에서 지금 할 수 있는 한 가지에 집중해보세요.',
  money:'재물의 기운은 흐름을 읽는 눈에서 시작됩니다. 무리한 욕심보다 카드가 전한 균형의 메시지를 기억하세요.',
  choice:'선택의 답은 이미 당신 안에 있습니다. 카드는 그 마음을 비추는 거울일 뿐 — 세 장의 흐름이 가리키는 방향을 느껴보세요.',
  mind:'마음의 날씨도 하늘처럼 흐리다 개는 법입니다. 카드가 비춘 지금의 내 마음을 있는 그대로 안아주세요.',
};

// ── Date ─────────────────────────────────────────
const now = new Date();
const wds = ['일','월','화','수','목','금','토'];
document.getElementById('today-date').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${wds[now.getDay()]})`;

// ── Question grid ────────────────────────────────
let selectedQ = null;
const qGrid = document.getElementById('q-grid');
QUESTIONS.forEach(q => {
  const div = document.createElement('div');
  div.className = 'qcard';
  div.dataset.id = q.id;
  div.innerHTML = `<span class="qcard-emoji">${q.emoji}</span><span class="qcard-label">${q.label}</span>`;
  div.addEventListener('click', () => selectQuestion(q));
  qGrid.appendChild(div);
});

function selectQuestion(q) {
  if(selectedQ) return; // lock after choosing
  selectedQ = q;
  document.querySelector(`.qcard[data-id="${q.id}"]`).classList.add('selected');
  document.querySelectorAll('.qcard').forEach(c => { if(c.dataset.id!==q.id) c.style.opacity = '.35'; });
  setTimeout(() => {
    document.getElementById('deck-stage').classList.add('visible');
    document.getElementById('deck-stage').scrollIntoView({behavior:'smooth', block:'center'});
    buildFan();
  }, 350);
}

// ── Fan deck ─────────────────────────────────────
const FAN_SIZE = 8;
let pickedCount = 0;
let drawnCards = [];

function buildFan() {
  const fan = document.getElementById('fan');
  fan.innerHTML = '';
  // shuffle full deck, take random cards behind the scenes
  const shuffled = [...CARDS].sort(() => Math.random()-.5);
  for(let i=0; i<FAN_SIZE; i++) {
    const el = document.createElement('div');
    el.className = 'fan-card';
    const rot = (i - (FAN_SIZE-1)/2) * 6;
    el.style.transform = `rotate(${rot}deg) translateY(${Math.abs(rot)*1.1}px)`;
    el.addEventListener('click', () => pickCard(el, shuffled[i]));
    fan.appendChild(el);
  }
}

function pickCard(el, card) {
  if(pickedCount >= 3 || el.classList.contains('picked')) return;
  el.classList.add('picked');
  const reversed = Math.random() < 0.3; // 30% reversed
  drawnCards.push({...card, reversed});
  pickedCount++;
  document.getElementById('pick-count').textContent = 3 - pickedCount;
  if(pickedCount === 3) {
    setTimeout(showReading, 500);
  }
}

// ── Reading ──────────────────────────────────────
function showReading() {
  document.getElementById('deck-stage').style.display = 'none';
  const reading = document.getElementById('reading');
  reading.classList.add('visible');

  const area = document.getElementById('cards-area');
  area.innerHTML = drawnCards.map((c, i) => `
    <div class="tcard-wrap" style="animation-delay:${i*.15}s">
      <div class="tcard" id="tcard-${i}" onclick="flip(${i})">
        <div class="tface tback">
          <div class="tback-star">✦</div>
          <div class="tback-hint">눌러서 카드 확인하기</div>
        </div>
        <div class="tface tfront">
          <span class="pos-label">${POSITIONS[i]}</span>
          <div class="temoji">${c.emoji}</div>
          <div class="tname-row">
            <span class="tname">${c.name}</span>
            <span class="tname-en">${c.en}</span>
            ${c.reversed ? '<span class="treversed">역방향 ↓</span>' : ''}
          </div>
          <div class="tkeywords">${c.kw.map(k=>`<span class="kw">${k}</span>`).join('')}</div>
          <p class="tmeaning">${c.reversed ? c.rev : c.up}</p>
        </div>
      </div>
    </div>
  `).join('');

  reading.scrollIntoView({behavior:'smooth', block:'start'});
}

let flippedCount = 0;
function flip(i) {
  const el = document.getElementById('tcard-'+i);
  if(el.classList.contains('flipped')) return;
  el.classList.add('flipped');
  flippedCount++;
  if(flippedCount === 3) {
    setTimeout(() => {
      document.getElementById('summary-text').textContent = SUMMARIES[selectedQ.id];
      document.getElementById('summary').classList.add('visible');
      document.getElementById('summary').scrollIntoView({behavior:'smooth', block:'center'});
    }, 900);
  }
}
</script>
